name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!

  - type: dropdown
    id: setup
    attributes:
      label: Setup type
      options:
        - Local GPU (own hardware)
        - AWS EC2
        - RunPod
        - Lambda Labs
        - GCP / Azure
        - Other cloud
    validations:
      required: true

  - type: input
    id: gpu
    attributes:
      label: GPU model and VRAM
      placeholder: e.g. NVIDIA L40S 45GB
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Ollama model
      placeholder: e.g. qwen3.5:35b
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ./scripts/tunnel.sh start
        2. Run ./scripts/claude-local.sh
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
